<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudLab — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 36px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: #185FA5;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 18px; height: 18px; fill: white; }
    .logo-text { font-size: 18px; font-weight: 600; color: #111; }

    .tabs {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1; text-align: center;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      color: #6b7280;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab.active {
      color: #185FA5;
      border-bottom-color: #185FA5;
      font-weight: 500;
    }

    .form { display: none; }
    .form.active { display: block; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.15s;
    }

    input:focus { border-color: #185FA5; }

    .btn {
      width: 100%;
      padding: 10px;
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #0C447C; }

    .msg {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }

    .msg.success { background: #EAF3DE; color: #27500A; display: block; }
    .msg.error   { background: #FCEBEB; color: #A32D2D; display: block; }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16">
        <path d="M8 1L14 4.5v7L8 15 2 11.5v-7z"/>
      </svg>
    </div>
    <span class="logo-text">CloudLab</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <!-- Login Form -->
  <div class="form active" id="login-form">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@example.com">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••">
    <button class="btn" onclick="login()">Login</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Register Form -->
  <div class="form" id="register-form">
    <label>Name</label>
    <input type="text" id="reg-name" placeholder="Your name">
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="you@example.com">
    <label>Password</label>
    <input type="password" id="reg-pass" placeholder="••••••••">
    <button class="btn" onclick="register()">Create account</button>
    <div class="msg" id="reg-msg"></div>
  </div>

</div>

<script>
  const API = 'api/auth.php';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    document.getElementById(tab + '-form').classList.add('active');
    event.target.classList.add('active');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function login() {
    const email = document.getElementById('login-email').value;
    const pass  = document.getElementById('login-pass').value;
    const res   = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password: pass })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('user_name', data.name);
      window.location.href = 'dashboard.html';
    } else {
      showMsg('login-msg', data.error, 'error');
    }
  }

  async function register() {
    const name  = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const pass  = document.getElementById('reg-pass').value;
    const res   = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'register', name, email, password: pass })
    });
    const data = await res.json();
    if (data.success) {
      showMsg('reg-msg', 'Account created! Please login.', 'success');
    } else {
      showMsg('reg-msg', data.error, 'error');
    }
  }
</script>

</body>
</html>
